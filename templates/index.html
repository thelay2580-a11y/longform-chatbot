<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>유튜브 만능 트렌드 탐색기</title>
  <style>
    body { font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif; margin: 16px; }
    input, select, button, textarea { padding: 10px; margin: 6px 0; width: 100%; max-width: 720px; box-sizing: border-box; }
    textarea { min-height: 92px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; vertical-align: top; }
    th { background: #f5f5f5; }
    .hint { color: #555; font-size: 13px; margin: 10px 0; max-width: 720px; line-height: 1.35; }
    .rowbtn { width: auto; padding: 8px 10px; cursor: pointer; font-weight: bold; }
    pre { white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; margin-top: 12px; max-width: 980px; }
    .filter-group { display: flex; gap: 10px; max-width: 720px; }
    .filter-group > div { flex: 1; }
  </style>
</head>
<body>
  <h2>🚀 유튜브 만능 트렌드 탐색기 (쇼츠 & 롱폼)</h2>

  <div class="hint">
    ✅ <b>사용 흐름:</b> (1) 검색 → (2) TOP 리스트 확인 → (3) 핵심 요약 입력 → (4) [📋 제작 지침 복사] → (5) 학습 AI에 붙여넣기<br/>
    💡 영상 길이에 따라 복사되는 '제작 대본 길이'가 자동으로 스마트하게 조절됩니다!
  </div>

  <label>검색어</label>
  <input id="query" placeholder="예: 정치, 뉴스, 건강, 의학, 시니어, 경제, 생활" />

  <div class="filter-group">
    <div>
      <label>영상 길이 (새기능!)</label>
      <select id="duration">
        <option value="shorts" selected>1분 미만 (쇼츠 전용)</option>
        <option value="under_5m">1분 ~ 5분 미만 (미드폼)</option>
        <option value="over_10m">10분 이상 (롱폼)</option>
        <option value="all">전체 길이 무관</option>
      </select>
    </div>
    <div>
      <label>기간</label>
      <select id="days">
        <option value="1">오늘(1일)</option>
        <option value="3" selected>최근 3일</option>
        <option value="7">최근 7일</option>
        <option value="30">최근 30일</option>
        <option value="365">최근 1년</option>
        <option value="3650">전체 (모든 기간)</option>
      </select>
    </div>
  </div>

  <div class="filter-group">
    <div>
      <label>최소 조회수(필터)</label>
      <input id="min_views" type="number" value="5000" />
    </div>
    <div>
      <label>정렬 기준</label>
      <select id="sort_by">
        <option value="final" selected>혼합 추천순</option>
        <option value="traffic">트래픽 폭발순</option>
        <option value="replication">신인 재현순</option>
      </select>
    </div>
  </div>

  <label>카테고리 (복사용 지침에 자동 반영)</label>
  <select id="category">
    <option value="politics_news" selected>정치/뉴스/이슈</option>
    <option value="economy">경제/재테크/부동산</option>
    <option value="health_life">건강/의학/시니어/생활</option>
  </select>

  <label>핵심 내용 요약 (VIDEO_SUMMARY)</label>
  <textarea id="video_summary" placeholder="예) 1) ○○ 정책 논란 핵심  2) 반대/찬성 쟁점  3) 결론/주의점"></textarea>

  <button id="btn">트렌드 찾기</button>

  <div id="status" style="margin-top:10px; font-weight: bold; color: blue;"></div>

  <table id="tbl" style="display:none;">
    <thead>
      <tr>
        <th>순위</th>
        <th>점수</th>
        <th>제목/링크</th>
        <th>채널</th>
        <th>조회수</th>
        <th>좋아요</th>
        <th>v/h</th>
        <th>view/sub</th>
        <th>업로드</th>
        <th>복사</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <pre id="resultBox" style="display:none;"></pre>

<script>
let LAST_ROWS = [];

const btn = document.getElementById("btn");
btn.onclick = async () => {
  const query = document.getElementById("query").value.trim();
  const days = parseInt(document.getElementById("days").value, 10);
  const min_views = parseInt(document.getElementById("min_views").value, 10);
  const sort_by = document.getElementById("sort_by").value;
  const duration = document.getElementById("duration").value; // 길이 값 추가

  if (!query) { alert("검색어를 입력하세요"); return; }

  document.getElementById("status").innerText = "⏳ 유튜브 데이터를 가져오는 중입니다... (약 3~5초 소요)";
  document.getElementById("tbl").style.display = "none";
  
  try {
    const res = await fetch("/api/trends", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ query, days, min_views, topn: 100, sort_by, duration })
    });

    const data = await res.json();
    if (!res.ok) {
      document.getElementById("status").innerText = "❌ 오류: " + (data.error || "알 수 없는 오류");
      return;
    }

    const rows = data.rows || [];
    LAST_ROWS = rows;

    if (rows.length === 0) {
      document.getElementById("status").innerText = "조건에 맞는 영상이 없습니다.";
      return;
    }

    document.getElementById("status").innerText = `✅ 결과 ${rows.length}개 완료!`;
    const tbody = document.querySelector("#tbl tbody");
    tbody.innerHTML = "";
    document.getElementById("tbl").style.display = "";

    rows.forEach((r, idx) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><b>${idx+1}</b></td>
        <td>
          <div style="color:blue;"><b>${num(r.final_score)}</b> (혼합)</div>
          <div style="color:red;">${num(r.traffic_score)} (폭발)</div>
          <div style="color:green;">${num(r.replication_score)} (재현)</div>
        </td>
        <td><a href="${r.video_url}" target="_blank" style="text-decoration:none;">${escapeHtml(r.title)}</a></td>
        <td><a href="${r.channel_url}" target="_blank">${escapeHtml(r.channel_title)}</a></td>
        <td>${r.views.toLocaleString()}</td>
        <td>${r.likes.toLocaleString()}</td>
        <td>${num(r.views_per_hour)}</td>
        <td>${num(r.view_sub_ratio)}</td>
        <td>${escapeHtml(r.published_at)}</td>
        <td><button class="rowbtn" onclick="copyBrief(${idx})">📋 제작 지침 복사</button></td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    document.getElementById("status").innerText = "❌ 네트워크 오류가 발생했습니다.";
  }
};

function categoryLabel(v){
  if (v === "health_life") return "건강/의학/시니어/생활";
  if (v === "economy") return "경제/재테크/부동산";
  return "정치/뉴스/이슈";
}

function buildBriefText(row, rank){
  const category = document.getElementById("category").value;
  const duration = document.getElementById("duration").value;
  const summary = (document.getElementById("video_summary").value || "").trim();
  const safeSummary = summary ? summary : "※ (요약 미입력) 제공된 정보와 맥락을 추정하여, 허위 사실 없이 완벽하게 재구성하세요.";

  let imageStyle = "";
  if (category === "politics_news") imageStyle = "Documentary news style, realistic, credible, newsroom atmosphere";
  else if (category === "economy") imageStyle = "Professional financial style, wealth, success, realistic, modern office or chart background";
  else imageStyle = "Warm senior lifestyle style, empathetic, realistic, everyday Korean life mood";

  // 스마트 스크립트 분량 자동 조절
  let scriptLength = "한국어 띄어쓰기 포함 300자~400자 내외 (나레이션 40~60초 쇼츠 분량)";
  let contentStructure = "- 0~2초: 강력한 훅 (경고/질문/반전)\n- 3~7초: 끝까지 봐야 하는 이유 제시\n- 중반: 핵심 정보 3포인트\n- 마무리(마지막 5초): 핵심 한 줄 요약 + 구독 유도";

  if (duration === "under_5m" || duration === "all") {
    scriptLength = "한국어 띄어쓰기 포함 1000자~1500자 내외 (나레이션 3~5분 미드폼 분량)";
    contentStructure = "- 오프닝 (15초): 강력한 훅과 주제 제시\n- 본론: 3~4개의 명확한 챕터로 나누어 상세 정보와 사례 제시\n- 결론: 내용 요약 및 시청자 행동 유도(구독/좋아요)";
  } else if (duration === "over_10m") {
    scriptLength = "한국어 띄어쓰기 포함 3000자 이상 (나레이션 10분 이상 롱폼 분량, 서론/본론/결론 명확히 구분)";
    contentStructure = "- 오프닝 (30초): 시청자의 문제를 짚어주고 해결책 제시\n- 본론: 5개 이상의 상세 챕터, 깊이 있는 정보와 비유\n- 브릿지: 챕터 사이사이 이탈을 막는 떡밥 투척\n- 결론: 최종 요약 및 채널 구독의 당위성 어필";
  }

  return `[트렌드 기반 맞춤형 제작 지침 v4]

1. 참고 영상 정보
- 영상 링크: ${row.video_url}
- 채널: ${row.channel_title}
- 조회수: ${row.views.toLocaleString()} (트렌드 순위 TOP ${rank})
- 조회 속도(v/h): ${row.views_per_hour}, 구독자 대비(view/sub): ${row.view_sub_ratio}

2. 핵심 내용 요약
${safeSummary}

3. 제작 방향 (중요)
- 참고 영상의 문장을 그대로 베끼지 말고, 완전히 새로운 각도와 질문으로 재구성할 것.
- 타깃 카테고리: ${categoryLabel(category)}

4. 대본 제작 요구사항
- 대본 목표 길이: ${scriptLength}
- 구성 흐름:
${contentStructure}

5. 카테고리별 안전 규칙
[정치/뉴스/이슈] 팩트 기반 중립성 유지, 자극적 선동 금지 (단, 톤은 긴장감 있게)
[경제/재테크] 맹목적 매수/매도 추천 금지, 객관적 수치 위주 설명
[건강/생활] 치료 완치 단정 금지, 의사 상담 권유, 이해하기 쉬운 단어 사용

6. 최종 출력 요청 (아래 순서로 출력할 것)
① 클릭 유도 제목 5개
② 썸네일 문구 5개 (텍스트만)
③ 영상 대본 1개 (위 요구사항 분량에 맞춰서)
④ 유튜브 영상 설명란 (3줄 요약)
⑤ 해시태그 20개

⑥ 썸네일용 영문 이미지 프롬프트 1개
- Korean person(s), Korean setting
- ${imageStyle}
- cinematic lighting, 16:9 ratio, ultra realistic, no text

⑦ 영상 배경용 영문 이미지 프롬프트 6개 (장면별 분리)
- Korean person(s), Korean setting
- ${imageStyle}
- each prompt independent, 16:9 ratio, ultra realistic, no text
`;
}

async function copyBrief(idx){
  const row = LAST_ROWS[idx];
  if (!row) return;

  const text = buildBriefText(row, idx + 1);
  const box = document.getElementById("resultBox");
  box.style.display = "block";
  box.textContent = text;

  try {
    await navigator.clipboard.writeText(text);
    document.getElementById("status").innerText = "✅ [복사 완료] 학습 AI에 Ctrl+V 로 붙여넣기 하세요!";
  } catch (e) {
    selectText(box);
    document.getElementById("status").innerText = "⚠️ 자동 복사 실패. 아래 텍스트가 파랗게 선택되었으니 직접 복사(Ctrl+C) 해주세요.";
  }
}

function selectText(el){
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function num(v){ return (v === null || v === undefined) ? "" : String(v); }
function escapeHtml(str){ return (str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
</script>
</body>
</html>
